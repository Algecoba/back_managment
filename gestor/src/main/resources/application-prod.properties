# ============================================================
#  PERFIL: prod — servidor institucional
#  Los valores reales llegan como variables de entorno
#  NUNCA escribir credenciales reales en este archivo
# ============================================================

# ── Base de datos ────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiracion-ms=${JWT_EXPIRACION_MS}

# ── En producción no mostrar SQL en logs ────────────────────
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

# ── Logs solo errores en producción ─────────────────────────
logging.level.com.unisimon.gestor=INFO
logging.level.org.springframework.security=WARN