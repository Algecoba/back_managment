# ============================================================
#  CONFIGURACIÓN BASE — aplica a todos los ambientes
#  Los valores sensibles se sobreescriben en application-dev
#  o application-prod según el perfil activo
# ============================================================

# ── Aplicación ──────────────────────────────────────────────
spring.application.name=gestor

# ── Perfil activo por defecto ────────────────────────────────
# Cambiar a 'prod' en el servidor de producción
spring.profiles.active=dev

# ── Puerto ──────────────────────────────────────────────────
server.port=8080

# ── JPA / Hibernate ─────────────────────────────────────────
# 'validate'  → solo verifica que el esquema coincida (producción)
# 'update'    → ajusta el esquema automáticamente (desarrollo)
# 'create'    → recrea el esquema cada vez (pruebas)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Actuator ─────────────────────────────────────────────────
# Solo exponemos health para el healthcheck de Docker
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── CORS ─────────────────────────────────────────────────────
cors.origen-permitido=http://localhost:5173