services:

  # ── SQL Server 2022 ─────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gestor_sqlserver
    environment:
      SA_PASSWORD: "GestorDev2025!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P GestorDev2025! -Q 'SELECT 1' -No -C" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Aplicación Spring Boot ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gestor_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=gestor_db;encrypt=false;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "GestorDev2025!"
      JWT_SECRET: "prod-clave-super-secreta-minimo-32-caracteres-gestor"
      JWT_EXPIRACION_MS: "86400000"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver_data:
